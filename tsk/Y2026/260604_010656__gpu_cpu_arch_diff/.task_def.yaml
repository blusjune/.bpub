summary: gpu_cpu_arch_diff
subtasks:
  - (1) Nvidia GPU (Blackwell, Rubin 등), Intel CPU (Xeon 등) 간 architecture 및 주요 동작 특성, 설계 목표 관점의 차이점을 기술적으로 정밀하게 이해하고, compute 전략과 memory access pattern, memory performance, memory capacity 관점의 insight을 얻고자 한다면, 어떤 어떤 질문을 던지면 좋을지 깊은 고민을 통해 10개의 핵심 질문을 도출하여, markdown file로 저장한다.
  - (2) 도출된 10개의 질문들에 대해서 전문가 관점에서 cross review를 진행하여 질문들을 revise한다. 이 결과도 markdown file로 저장.
  - (3) revise된 10개의 질문에 답할 수 있도록 하는, 그래서 architecure 차이점에 대한 insight을 얻을 수 있게 하는 program을 작성한다. Nvidia GPU와 Intel CPU에서 동일한 기능을 수행하면서 그 차이점이 부각될 수 있도록 한다 (예를 들면 10개의 1024 x 1024 matrix multiplication, 다발하는 interrupt 처리 등으로 인해 branch 가 많이 유발되는 interrupt management loop 등). 물론 문제 없이 동작해야 하고, architecture 차이점에 대한 insight을 얻을 수 있었는지 확인하고, 필요하다면 program을 revise한다.
  - (4) 위 program 실행 시 나타나는 성능 병목의 차이점을 효과적이고도 정확히 profiling하고, visualization할 수 있도록 Python (혹은 bash, 혹은 powershell) script을 작성한다. 역시 문제 없이 동작하는지 검증.
  - (5) 지금까지 수행된 실험 결과를 정리하여 white paper (markdown file 혹은 HTML file)로 작성한다.

special_requests:
  - user confirmation question하느라 block 되지 말고 just do it.
tags:
  - architecture
  - difference
  - performance_profiling
acceptance_criteria:
  - 실험 결과 및 white paper에서 Nvidia GPU (Blackwell, Rubin 등), Intel CPU (Xeon 등) 간 architecture 및 동작 특성, memory 사용 방식의 차이점이 명확히 도출되어야 한다.
